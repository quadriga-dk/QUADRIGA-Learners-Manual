description: Dieses interaktive Lehrbuch führt in die Erstellung von Open Educational
  Resources (OER) nach den Empfehlungen und Vorgaben des Datenkompetenzzentrumgs QUADRIGA
  als <a href="https://jupyterbook.org">Jupyter Book</a> ein. Diese Empfehlungen und
  Vorgaben sind einerseits inhaltlicher und didaktischer andererseits technischer
  Natur. Diese OER richtet sich vorrangig an OER-Erstellende und kann als Startpunkt
  (Template) für die Erstellung eigener OER genutzt werden. Einzelne (Unter-)Kapitel
  bieten zudem Erläuterungen zu Funktionalitäten für Lernende.
